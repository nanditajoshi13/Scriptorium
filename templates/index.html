<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIPTORIUM | GNDEC Manual Architect</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css" type="text/css" />
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>SCRIPTORIUM</h1>
        <p>Institutional Practical File Architect</p>
    </div>
    
    <form action="/generate" method="POST" id="manualForm">
        
        <div class="section-box">
            <h3>I. Front Page Identification</h3>
            <div class="grid">
                <div>
                    <label>Candidate Name:</label>
                    <input type="text" name="name" placeholder="Full Name" required>
                    <label>University Roll No (URN):</label>
                    <input type="text" name="urn" placeholder="e.g. 2435603" required>
                    <label>College Roll No (CRN):</label>
                    <input type="text" name="crn" placeholder="e.g. 2421122" required>
                    <label>Class & Section:</label>
                    <input type="text" name="class_sec" placeholder="e.g. D2ITB2" required>
                </div>
                <div>
                    <label>Academic Branch:</label>
                    <select name="branch" id="branchSelect" required>
                        <option value="">-- Select Branch --</option>
                        <option value="IT">Information Technology</option>
                        <option value="CSE">Computer Science Engineering</option>
                        <option value="ECE">Electronics & Communication</option>
                    </select>
                    <label>Academic Year:</label>
                    <select name="year" id="yearSelect" required>
                        <option value="">-- Select Year --</option>
                        <option value="2">2nd Year (4th Sem)</option>
                        <option value="3">3rd Year (6th Sem)</option>
                        <option value="4">4th Year (8th Sem)</option>
                    </select>
                    <label>Subject:</label>
                    <select name="subject_id" id="subjectSelect" required>
                        <option value="">Select Year & Branch first</option>
                    </select>
                    <input type="hidden" name="subject_name" id="subNameHidden">
                    <label>Submitted To:</label>
                    <select name="teacher" id="teacherSelect" required>
                        <option value="">Select Subject first</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section-box">
            <h3>II. Document Configuration</h3>
            <div class="toggle-group">
                <label style="margin: 0;"><input type="checkbox" name="needs_index" id="indexToggle" checked> Include Index Page</label>
                <label style="margin: 0; padding-left: 20px; border-left: 1px solid #ccc;">
                    <input type="checkbox" name="index_page_col" id="pageColToggle"> Add Page No. Column
                </label>
            </div>
        </div>

        <div id="exp-container">
            <div class="exp-card">
                <h3>Experiment Construction</h3>
                <div style="display: flex; gap: 20px;">
                    <div style="width: 120px;">
                        <label>Exp #:</label>
                        <input type="text" name="exp_number[]" value="1">
                    </div>
                    <div style="flex: 1;">
                        <label>Aim:</label>
                        <textarea name="exp_aim[]" rows="2" required placeholder="Enter experiment objective..."></textarea>
                    </div>
                </div>

                <div class="toggle-group">
                    <label><input type="checkbox" class="toggle-section" data-target="app-0" name="include_apparatus[0]"> Include Apparatus</label>
                    <label><input type="checkbox" class="toggle-section" data-target="theo-0" name="include_theory[0]"> Include Theory</label>
                </div>

                <div id="app-0" style="display:none">
                    <label>Apparatus / Requirements:</label>
                    <div id="edit-app-0" class="editor-container"></div>
                    <input type="hidden" name="exp_apparatus[]" id="hid-app-0">
                </div>

                <div id="theo-0" style="display:none">
                    <label>Theory:</label>
                    <div id="edit-theo-0" class="editor-container"></div>
                    <input type="hidden" name="exp_theory[]" id="hid-theo-0">
                </div>

                <label>Source Code:</label>
                <textarea name="exp_code[]" rows="10" style="font-family: monospace; background:#1e1e1e; color:#d4d4d4; padding:10px;"></textarea>

                <label>Output Screenshots:</label>
                <div class="dropzone" id="dz-out-0"></div>
                <div id="img-paths-0"></div> 
            </div>
        </div>

        <button type="submit" class="submit-btn">GENERATE FORMAL PDF MANUAL</button>
    </form>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    const config = {
        theme: 'snow',
        modules: { toolbar: [['bold', 'italic', 'underline'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image', 'clean']] }
    };
    const quillApp = new Quill('#edit-app-0', config);
    const quillTheo = new Quill('#edit-theo-0', config);

    const indexToggle = document.getElementById('indexToggle');
    const pageColToggle = document.getElementById('pageColToggle');
    pageColToggle.disabled = !indexToggle.checked;
    indexToggle.addEventListener('change', () => {
        pageColToggle.disabled = !indexToggle.checked;
        if (!indexToggle.checked) pageColToggle.checked = false;
    });

    const branchSel = document.getElementById('branchSelect');
    const yearSel = document.getElementById('yearSelect');
    const subSel = document.getElementById('subjectSelect');
    const teachSel = document.getElementById('teacherSelect');

    async function loadSubjects() {
        if (!branchSel.value || !yearSel.value) return;
        const res = await fetch(`/get_subjects_list/${yearSel.value}/${branchSel.value}`);
        const data = await res.json();
        subSel.innerHTML = '<option value="">-- Select Subject --</option>';
        data.forEach(s => subSel.innerHTML += `<option value="${s.id}">${s.name}</option>`);
    }

    subSel.addEventListener('change', async () => {
        if(!subSel.value) return;
        document.getElementById('subNameHidden').value = subSel.options[subSel.selectedIndex].text;
        const res = await fetch(`/get_teachers_list/${subSel.value}`);
        const data = await res.json();
        teachSel.innerHTML = '<option value="">-- Select Teacher --</option>';
        data.forEach(t => teachSel.innerHTML += `<option value="${t.name}">${t.name}</option>`);
    });

    branchSel.addEventListener('change', loadSubjects);
    yearSel.addEventListener('change', loadSubjects);

    document.querySelectorAll('.toggle-section').forEach(cb => {
        cb.addEventListener('change', (e) => {
            document.getElementById(e.target.dataset.target).style.display = e.target.checked ? 'block' : 'none';
        });
    });

    Dropzone.autoDiscover = false;
    const dz = new Dropzone("#dz-out-0", { 
        url: "/upload-img",
        dictDefaultMessage: "Drag Output Images Here",
        success: (file, res) => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'exp_images[0][]';
            input.value = res.path;
            document.getElementById('img-paths-0').appendChild(input);
        }
    });

    document.getElementById('manualForm').onsubmit = function() {
        document.getElementById('hid-app-0').value = quillApp.root.innerHTML;
        document.getElementById('hid-theo-0').value = quillTheo.root.innerHTML;
        return true; 
    };
</script>

</body>
</html>
